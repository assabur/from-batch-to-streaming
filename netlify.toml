[build]
publish = "dist"
command = "npm run build"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/.well-known/*"
to = "/.well-known/:splat"
status = 200

[[redirects]]
from = "/from-batch-to-streaming/*"
to = "/from-batch-to-streaming/index.html"
status = 200

[[redirects]]
from = "/apache-kafka-for-real-time-data-streaming/*"
to = "/apache-kafka-for-real-time-data-streaming/index.html"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
